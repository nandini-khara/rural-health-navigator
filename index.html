<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rural Health Navigator Agent</title>

  <style>
    :root{
      --primary:#2e7d32;
      --primary-600:#1b5e20;
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --danger:#c62828;
      --warning:#f59e0b;
      --success:#16a34a;
      --radius:14px;
      --shadow:0 10px 20px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
      background:var(--bg);
      color:var(--text);
    }
    header{
      background:linear-gradient(135deg,var(--primary),#66bb6a);
      color:#fff;
      padding:28px 16px;
    }
    .container{
      max-width:980px;
      margin:0 auto;
      padding:0 16px;
    }
    .title{
      font-size:28px;
      font-weight:700;
      letter-spacing:.3px;
      margin:0 0 6px;
      text-align: center;
    }
    .subtitle{
      margin:0;
      opacity:.95;
      font-size:14px;
      text-align: center;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-top:16px;
      border:1px solid var(--border);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    @media (max-width:720px){
      .grid{grid-template-columns:1fr}
    }

    label{
      font-size:13px;
      color:var(--muted);
      display:block;
      margin-bottom:6px;
      font-weight:600;
    }
    input, select, textarea{
      width:100%;
      padding:12px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      outline:none;
      font-size:14px;
      background:#fff;
      transition:.2s border, .2s box-shadow;
    }
    textarea{min-height:110px; resize:vertical}
    input:focus, select:focus, textarea:focus{
      border-color:#9ccc65;
      box-shadow:0 0 0 3px rgba(156,204,101,.2);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    button{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:600;
      letter-spacing:.2px;
      transition:.2s transform,.2s box-shadow,.2s background;
    }
    .btn-primary{
      background:var(--primary);
      color:#fff;
      box-shadow:0 6px 14px rgba(46,125,50,.25);
    }
    .btn-primary:hover{ background:var(--primary-600); transform:translateY(-1px)}
    .btn-ghost{
      background:#eef7ee;
      color:var(--primary-600);
    }
    .btn-ghost:hover{ background:#e4f2e4 }

    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    .status{
      display:none;
      align-items:center;
      gap:8px;
      font-size:13px;
      margin-top:10px;
      color:var(--muted);
    }
    .spinner{
      width:16px;height:16px;border-radius:50%;
      border:2px solid #cfe8cf;border-top-color:var(--primary);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .results{
      display:none;
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.2px;
      margin-bottom:8px;
    }
    .pill.low{ background:#e6f7ee; color:var(--success)}
    .pill.medium{ background:#fff3cd; color:#8a6d3b}
    .pill.high{ background:#fdecea; color:var(--danger)}

    .result-box{
      background:#fafafa;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      margin-top:10px;
      font-size:14px;
      line-height:1.5;
    }

    .hospitals{
      margin-top:12px;
    }
    .hospital{
      border:1px dashed var(--border);
      border-radius:12px;
      padding:10px;
      margin-top:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .hospital b{display:block}

    .disclaimer{
      margin-top:14px;
      font-size:12px;
      color:var(--danger);
      background:#fff5f5;
      border:1px solid #ffe3e3;
      padding:10px;
      border-radius:10px;
    }

    footer{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      padding:18px 0 28px;
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1 class="title">Rural Health Navigator Agent</h1>
    <p class="subtitle">AI-powered health guidance for underserved communities</p>
  </div>
</header>

<main class="container">

  <!-- OPTION SELECTION -->
  <section class="card" id="modeSelection">
    <h3>Select Service</h3>
    <div class="actions">
      <button class="btn-primary" onclick="selectMode('quick')">
        Quick Health Check
      </button>
      <button class="btn-ghost" onclick="selectMode('full')">
        Get Full Assistance
      </button>
    </div>
    <p class="hint">Quick check does not require personal details.</p>
  </section>

  <!-- QUICK CHECK FORM -->
  <section class="card" id="quickForm" style="display:none;">
    <h3>Quick Health Check</h3>

    <label>Describe symptoms</label>
    <textarea id="quickSymptoms" placeholder="e.g. fever, cough..."></textarea>

    <div class="actions">
      <button class="btn-primary" onclick="analyzeQuick()">Analyze</button>
      <button class="btn-ghost" onclick="goBack()">Back</button>
    </div>
  </section>

  <!-- FULL FORM -->
  <section class="card" id="fullForm" style="display:none;">
    <h3>Full Assistance</h3>

    <div class="grid">
      <div>
        <label>Name</label>
        <input id="name" placeholder="Enter name">
      </div>
      <div>
        <label>Age</label>
        <input id="age" type="number">
      </div>
      <div>
        <label>Gender</label>
        <select id="gender">
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
      <div>
        <label>Phone (optional)</label>
        <input id="phone">
      </div>
    </div>

    <label>Symptoms</label>
    <textarea id="symptoms"></textarea>

    <label>Location</label>
    <input id="location">

    <div class="actions">
      <button class="btn-primary" onclick="analyzeFull()">Analyze</button>
      <button class="btn-ghost" onclick="goBack()">Back</button>
    </div>
  </section>

  <!-- RESULT -->
  <section class="card" id="resultBox" style="display:none;">
    <h3>Results</h3>
    <div id="resultText"></div>
  </section>

</main>
<footer>
  © 2026 Rural Health Navigator Agent
</footer>

<script>
  const analyzeBtn = document.getElementById('analyzeBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const urgencyPill = document.getElementById('urgencyPill');
  const explanationEl = document.getElementById('explanation');
  const adviceEl = document.getElementById('advice');
  const hospitalsEl = document.getElementById('hospitals');

  // Demo hospital data (replace with API later)
  const demoHospitals = [
    {name:'District Hospital', distance:'2.1 km', phone:'01234 567890'},
    {name:'Community Health Center', distance:'3.8 km', phone:'01234 111222'},
    {name:'Primary Health Center', distance:'5.2 km', phone:'01234 333444'}
  ];

  document.getElementById('useLocation').addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert('Geolocation not supported');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('location').value = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
      },
      () => alert('Unable to fetch location')
    );
  });

  analyzeBtn.addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const age = document.getElementById('age').value.trim();
    const gender = document.getElementById('gender').value;
    const symptoms = document.getElementById('symptoms').value.trim();
    const location = document.getElementById('location').value.trim();

    if (!symptoms) {
      alert('Please enter symptoms');
      return;
    }

    // show loading
    statusEl.style.display = 'flex';
    resultsEl.style.display = 'none';

    // ---- Replace this block with real API call ----
    // Example:
    // const res = await fetch('/backend.php', { method:'POST', body: JSON.stringify({name, age, gender, symptoms, location}) });
    // const data = await res.json();

    // Fake delay + mock response for demo
    await new Promise(r => setTimeout(r, 1200));
    const data = {
      urgency: 'medium',
      explanation: `Based on the symptoms provided (${symptoms}), common possibilities include viral infection or flu-like illness.`,
      advice: `Stay hydrated, take adequate rest, and monitor your temperature. If symptoms persist beyond 2–3 days or worsen, consult a doctor.`
    };
    // ------------------------------------------------

    // render results
    statusEl.style.display = 'none';
    resultsEl.style.display = 'block';

    urgencyPill.className = 'pill ' + data.urgency;
    urgencyPill.textContent = data.urgency.toUpperCase();

    explanationEl.textContent = data.explanation;
    adviceEl.textContent = data.advice;

    // render hospitals
    const list = demoHospitals.map(h => `
      <div class="hospital">
        <div>
          <b>${h.name}</b>
          <span>${h.distance}</span>
        </div>
        <div>
          <span>📞 ${h.phone}</span>
        </div>
      </div>
    `).join('');
    hospitalsEl.innerHTML = `<h4 style="margin:10px 0 6px;">Nearby Hospitals</h4>${list}`;
  });

  resetBtn.addEventListener('click', () => {
    document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    document.getElementById('gender').value = '';
    resultsEl.style.display = 'none';
    statusEl.style.display = 'none';
  });
</script>
<script>
    function selectMode(mode) {
  document.getElementById("modeSelection").style.display = "none";

  if (mode === "quick") {
    document.getElementById("quickForm").style.display = "block";
  } else {
    document.getElementById("fullForm").style.display = "block";
  }
}

function goBack() {
  document.getElementById("modeSelection").style.display = "block";
  document.getElementById("quickForm").style.display = "none";
  document.getElementById("fullForm").style.display = "none";
  document.getElementById("resultBox").style.display = "none";
}

function analyzeQuick() {
  const symptoms = document.getElementById("quickSymptoms").value;

  if (!symptoms) {
    alert("Please enter symptoms");
    return;
  }

  showResult(symptoms);
}

function analyzeFull() {
  const symptoms = document.getElementById("symptoms").value;

  if (!symptoms) {
    alert("Please enter symptoms");
    return;
  }

  showResult(symptoms);
}

function showResult(symptoms) {
  document.getElementById("quickForm").style.display = "none";
  document.getElementById("fullForm").style.display = "none";

  document.getElementById("resultBox").style.display = "block";

  document.getElementById("resultText").innerHTML =
    "Analyzing symptoms: <b>" + symptoms + "</b><br><br>" +
    "Possible condition: Viral infection<br>" +
    "Advice: Rest and hydration recommended.<br>" +
    "<span style='color:red'>Consult a doctor if symptoms persist.</span>";
}
</script>
</body>
</html>
